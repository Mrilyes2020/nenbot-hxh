<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NenBot | Hunter x Hunter AI Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #00e676;
            --primary-dim: #00c853;
            --glow: rgba(0, 230, 118, 0.25);
            --bg: #0b0e17;
            --surface: rgba(10, 14, 25, 0.85);
            --card: rgba(20, 28, 50, 0.75);
            --text: #e0e4f0;
            --dim: #6b7394;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Background ===== */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(0,230,118,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(30,60,180,0.08) 0%, transparent 55%),
                url('assets/chat_bg.png') center/cover no-repeat;
            filter: brightness(0.5);
        }
        .bg-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(180deg, rgba(10,14,23,0.5) 0%, rgba(10,14,23,0.85) 100%);
        }

        /* ===== Layout ===== */
        .app { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; }

        /* ===== Header ===== */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: rgba(10,14,25,0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo h1 {
            font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700;
            letter-spacing: 3px; color: #fff;
        }
        .logo h1 span { color: var(--primary); }
        .logo-tag {
            font-size: 0.65rem; background: rgba(0,230,118,0.12); color: var(--primary);
            padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 1px;
        }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-btn {
            background: none; border: none; color: var(--dim); font-size: 0.8rem;
            cursor: pointer; font-family: 'Inter', sans-serif; transition: color 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .header-btn:hover { color: #fff; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--primary); }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: blink 2s infinite;
        }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Team Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 30px; max-width: 500px; width: 90%;
            animation: fadeUp 0.3s ease;
        }
        .modal h2 { font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--primary); margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        .modal-close {
            float: left; background: none; border: none; color: var(--dim);
            font-size: 1.5rem; cursor: pointer; line-height: 1;
        }
        .modal-close:hover { color: #fff; }
        .member-card {
            background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .member-card h4 { color: #fff; margin-bottom: 10px; font-size: 0.95rem; }
        .member-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.82rem; }
        .member-label { color: var(--dim); }
        .member-value { color: var(--text); font-weight: 600; }

        /* ===== Chat Area ===== */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 24px 20px;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* Messages */
        .msg-row {
            display: flex; gap: 12px; animation: fadeUp 0.35s ease;
            max-width: 75%;
        }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.bot { align-self: flex-start; }

        .msg-avatar {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; margin-top: 2px;
        }
        .msg-row.user .msg-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 600;
        }
        .msg-row.bot .msg-avatar {
            background: rgba(0,230,118,0.12); border: 1.5px solid var(--primary);
            color: var(--primary); font-size: 1rem;
        }

        .msg-body { flex: 1; min-width: 0; }

        .msg-bubble {
            padding: 14px 18px; border-radius: 16px;
            line-height: 1.8; font-size: 0.92rem;
            word-wrap: break-word; position: relative;
        }
        .msg-row.user .msg-bubble {
            background: linear-gradient(135deg, rgba(100,80,220,0.6), rgba(60,50,160,0.5));
            border: 1px solid rgba(120,100,240,0.2);
            border-bottom-left-radius: 4px; color: #fff;
        }
        .msg-row.bot .msg-bubble {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-bottom-right-radius: 4px;
            backdrop-filter: blur(10px);
        }
        .msg-row.bot .msg-bubble strong { color: var(--primary); }
        .msg-row.bot .msg-bubble ul, .msg-row.bot .msg-bubble ol {
            padding-right: 18px; margin: 6px 0;
        }
        .msg-row.bot .msg-bubble li { margin-bottom: 4px; }
        .msg-row.bot .msg-bubble p { margin-bottom: 8px; }
        .msg-row.bot .msg-bubble p:last-child { margin-bottom: 0; }

        .msg-time {
            font-size: 0.68rem; color: var(--dim); margin-top: 5px;
            padding: 0 4px;
        }
        .msg-row.user .msg-time { text-align: left; }
        .msg-row.bot .msg-time { text-align: right; }

        /* Typing dots */
        .typing { display: flex; gap: 5px; padding: 14px 20px; }
        .typing span {
            width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-10px); } }

        /* Welcome */
        .welcome {
            align-self: center; text-align: center; padding: 40px 25px;
            max-width: 520px; animation: fadeUp 0.5s ease;
        }
        .welcome h2 { font-family: 'Orbitron', monospace; font-size: 1.4rem; color: #fff; margin-bottom: 10px; letter-spacing: 2px; }
        .welcome h2 span { color: var(--primary); }
        .welcome p { color: var(--dim); font-size: 0.88rem; line-height: 1.7; margin-bottom: 22px; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .sug-btn {
            padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(0,230,118,0.2);
            background: rgba(0,230,118,0.06); color: var(--primary); font-size: 0.82rem;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
        }
        .sug-btn:hover { background: rgba(0,230,118,0.15); transform: translateY(-2px); }

        /* ===== Input Bar ===== */
        .input-bar {
            padding: 14px 20px;
            background: rgba(10,14,25,0.8);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 10px;
        }
        .tool-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04); color: var(--dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: all 0.2s; flex-shrink: 0;
        }
        .tool-btn:hover { color: var(--primary); border-color: var(--primary); background: rgba(0,230,118,0.08); }
        .tool-btn.listening { color: #ff5252; border-color: #ff5252; background: rgba(255,82,82,0.12); animation: mic-pulse 1.5s infinite; }
        @keyframes mic-pulse { 0%{box-shadow:0 0 0 0 rgba(255,82,82,0.4)} 70%{box-shadow:0 0 0 10px transparent} 100%{box-shadow:0 0 0 0 transparent} }

        .input-wrap {
            flex: 1; display: flex; align-items: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px; padding: 0 16px; transition: border-color 0.2s;
        }
        .input-wrap:focus-within { border-color: rgba(0,230,118,0.4); }
        .input-wrap input {
            flex: 1; background: none; border: none; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 12px 0; outline: none;
        }
        .input-wrap input::placeholder { color: var(--dim); }

        .send-btn {
            width: 46px; height: 46px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dim));
            color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--glow);
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 30px var(--glow); }

        .tts-pill {
            position: fixed; bottom: 80px; right: 20px; z-index: 10;
            padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(0,230,118,0.2);
            background: rgba(10,14,25,0.85); backdrop-filter: blur(10px);
            color: var(--primary); font-size: 0.75rem; font-family: 'Orbitron', monospace;
            cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
        }
        .tts-pill:hover { background: rgba(0,230,118,0.1); }
        .tts-pill.off { color: var(--dim); border-color: rgba(255,255,255,0.08); }

        /* Image preview in chat */
        .img-preview { max-width: 200px; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,230,118,0.3); border-radius: 10px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 600px) {
            .msg-row { max-width: 92%; }
            .welcome h2 { font-size: 1.1rem; }
            .header { padding: 12px 14px; }
            .logo h1 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<!-- App -->
<div class="app">

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <h1>HUNTER <span>X</span> HUNTER</h1>
            <span class="logo-tag">AI ARCHIVE</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="document.getElementById('teamModal').classList.add('show')">TEAM</button>
            <div class="status"><span class="status-dot"></span> NEN SYSTEM ONLINE</div>
        </div>
    </header>

    <!-- Chat -->
    <div class="chat-area" id="chatArea">
        <div class="welcome">
            <h2>HUNTER <span>LICENSE</span></h2>
            <p>I'm NenBot — your AI companion for the Hunter x Hunter universe. Ask me about characters, Nen types, story arcs, or the development team.</p>
            <div class="suggestions">
                <button class="sug-btn" onclick="quickSend('Who is Gon Freecss?')">Who is Gon?</button>
                <button class="sug-btn" onclick="quickSend('Explain Nen types')">Nen Types</button>
                <button class="sug-btn" onclick="quickSend('Tell me about Killua')">Killua</button>
                <button class="sug-btn" onclick="quickSend('Who is the development team?')">Team Info</button>
            </div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <button class="tool-btn" id="micBtn" onclick="startDictation()" title="Voice input">🎤</button>
        <label class="tool-btn" title="Upload image" style="cursor:pointer;">
            🖼️
            <input type="file" accept="image/*" hidden id="imgInput" onchange="handleImage(event)">
        </label>
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="Ask about Hunter x Hunter..." onkeydown="if(event.key==='Enter')send()">
        </div>
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<!-- TTS Toggle Pill -->
<button class="tts-pill" id="ttsPill" onclick="toggleTTS()">TTS ON</button>

<!-- Team Modal -->
<div class="modal-overlay" id="teamModal" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal">
        <button class="modal-close" onclick="document.getElementById('teamModal').classList.remove('show')">✕</button>
        <h2>DEVELOPMENT TEAM</h2>
        <div id="teamCards"></div>
    </div>
</div>

<script>
// ===== CONFIG =====
const WEBHOOK_URL = "https://hackilyes.app.n8n.cloud/webhook/364bd7fe-125a-4d06-8eb6-fbb2bb84f510";
const sessionId = localStorage.getItem('nenbot_sid') || crypto.randomUUID();
localStorage.setItem('nenbot_sid', sessionId);
let ttsOn = true;

// ===== TEAM DATA =====
const team = [
    { name: "Ilyes Badreddine Rahmouni", level: "3rd-Year Bachelor's", age: "21", uni: "University of M'Sila", field: "Applied Mathematics" },
    { name: "Toumi Khalil", level: "3rd-Year Bachelor's", age: "21", uni: "University of M'Sila", field: "Applied Mathematics" },
    { name: "Hammadi Nada", level: "3rd-Year Bachelor's", age: "21", uni: "University of M'Sila", field: "Applied Mathematics" },
    { name: "Saoudi Samah", level: "3rd-Year Bachelor's", age: "21", uni: "University of M'Sila", field: "Applied Mathematics" }
];

// Render team cards
document.getElementById('teamCards').innerHTML = team.map(m => `
    <div class="member-card">
        <h4>${m.name}</h4>
        <div class="member-row"><span class="member-label">Level</span><span class="member-value">${m.level}</span></div>
        <div class="member-row"><span class="member-label">Age</span><span class="member-value">${m.age}</span></div>
        <div class="member-row"><span class="member-label">University</span><span class="member-value">${m.uni}</span></div>
        <div class="member-row"><span class="member-label">Field</span><span class="member-value">${m.field}</span></div>
    </div>
`).join('');

// ===== CHAT =====
function quickSend(t) { document.getElementById('userInput').value = t; send(); }

async function send() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    // Remove welcome
    const w = document.querySelector('.welcome');
    if (w) w.remove();

    addMsg(text, 'user');
    input.value = '';

    const dots = showTyping();
    try {
        const res = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, sessionId })
        });
        const data = await res.json();
        dots.remove();
        const reply = data.output || data[0]?.output || "Sorry, I couldn't process that.";
        addMsg(reply, 'bot');
        if (ttsOn) speak(reply);
    } catch {
        dots.remove();
        addMsg("⚠️ Connection error. Make sure your n8n workflow is active.", 'bot');
    }
}

function getTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function formatBot(text) {
    // Convert markdown-like patterns to HTML
    let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[\-•] (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>')
        .replace(/\n/g, '<br>');
    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li>.+?<\/li>(?:<br>)?)+)/g, '<ul>$1</ul>');
    html = html.replace(/<ul><br>/g, '<ul>').replace(/<br><\/ul>/g, '</ul>');
    // Wrap text blocks in <p>
    if (!html.includes('<ul>') && !html.includes('<li>')) {
        html = '<p>' + html.replace(/<br><br>/g, '</p><p>') + '</p>';
    }
    return html;
}

function addMsg(text, type) {
    const chat = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;

    const content = type === 'bot' ? formatBot(text) : `<p>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`;

    row.innerHTML = `
        <div class="msg-avatar">${type === 'bot' ? '⚡' : '👤'}</div>
        <div class="msg-body">
            <div class="msg-bubble">${content}</div>
            <div class="msg-time">${getTime()}</div>
        </div>
    `;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

function addMsgHTML(html, type) {
    const chat = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;
    row.innerHTML = `
        <div class="msg-avatar">${type === 'bot' ? '⚡' : '👤'}</div>
        <div class="msg-body">
            <div class="msg-bubble">${html}</div>
            <div class="msg-time">${getTime()}</div>
        </div>
    `;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const chat = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `
        <div class="msg-avatar">⚡</div>
        <div class="msg-body">
            <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
        </div>
    `;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
}

// ===== IMAGE UPLOAD =====
function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const src = ev.target.result;
        const w = document.querySelector('.welcome');
        if (w) w.remove();

        addMsgHTML(`<img src="${src}" class="img-preview"><br>Identify this Hunter x Hunter character`, 'user');
        const dots = showTyping();
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Identify this Hunter x Hunter character", sessionId, image: src })
            });
            const data = await res.json();
            dots.remove();
            addMsg(data.output || data[0]?.output || "Could not identify character.", 'bot');
        } catch {
            dots.remove();
            addMsg("⚠️ Connection error.", 'bot');
        }
    };
    reader.readAsDataURL(file);
    e.target.value = '';
}

// ===== SPEECH RECOGNITION =====
function startDictation() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Your browser doesn't support speech recognition. Use Chrome."); return; }
    const r = new SR();
    r.continuous = false; r.interimResults = false; r.lang = "ar-SA";
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    r.start();
    r.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; r.stop(); btn.classList.remove('listening'); send(); };
    r.onerror = () => { r.stop(); btn.classList.remove('listening'); };
    r.onend = () => btn.classList.remove('listening');
}

// ===== TTS =====
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-SA'; u.rate = 1; u.pitch = 1;
    const v = speechSynthesis.getVoices().find(v => v.lang.includes('ar'));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
}

function toggleTTS() {
    ttsOn = !ttsOn;
    const p = document.getElementById('ttsPill');
    p.textContent = ttsOn ? 'TTS ON' : 'TTS OFF';
    p.classList.toggle('off', !ttsOn);
    if (!ttsOn) speechSynthesis.cancel();
}

if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
</html>
